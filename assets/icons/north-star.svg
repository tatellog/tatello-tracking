<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="starBody" cx="50%" cy="50%" r="62%">
      <stop offset="0"    stop-color="#FFF6EC" stop-opacity="1" />
      <stop offset="0.22" stop-color="#F4ECDE" stop-opacity="0.95" />
      <stop offset="0.6"  stop-color="#FBD7E3" stop-opacity="0.85" />
      <stop offset="1"    stop-color="#E91E63" stop-opacity="0.7" />
    </radialGradient>
    <radialGradient id="starCore" cx="50%" cy="50%" r="50%">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="0.5" stop-color="#FFF6EC" stop-opacity="0.9" />
      <stop offset="1"   stop-color="#FBD7E3" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Four primary rays — now drawn as curved spurs (Q control points
       pull the flanks inward), so the tips read as soft, organic light
       rather than the sharp medical/religious cross of the old straight
       triangles. Vertical pair longer than the horizontal pair to break
       the perfect plus symmetry. -->
  <g>
    <path d="M60 8 Q62.4 44 64 54 Q60 58 56 54 Q57.6 44 60 8 Z" fill="url(#starBody)" />
    <path d="M60 110 Q61.6 78 63 66 Q60 62 57 66 Q58.4 78 60 110 Z" fill="url(#starBody)" opacity="0.7" />
    <path d="M16 60 Q48 57.6 56 56 Q60 60 56 64 Q48 62.4 16 60 Z" fill="url(#starBody)" opacity="0.78" />
    <path d="M104 60 Q72 57.6 64 56 Q60 60 64 64 Q72 62.4 104 60 Z" fill="url(#starBody)" opacity="0.78" />
  </g>
  <!-- Two minor spurs at off-cardinal angles — these are what break the
       "cross" silhouette and make the glyph read as a celestial body
       (a star catching light from several directions). -->
  <g>
    <path d="M60 60 Q72 42 84 30 Q74 46 62 58 Z" fill="url(#starBody)" opacity="0.34" />
    <path d="M60 60 Q46 74 33 88 Q48 74 58 62 Z" fill="url(#starBody)" opacity="0.28" />
  </g>
  <!-- Soft inner facets — retained, lightened, to keep the dimensional
       glint without redrawing the old hard cross diagonals. -->
  <g>
    <path d="M60 60 L77 39 L62 58 Z" fill="currentColor" opacity="0.18" />
    <path d="M60 60 L41 79 L58 62 Z" fill="currentColor" opacity="0.14" />
  </g>
  <circle cx="60" cy="60" r="11" fill="url(#starCore)" />
  <circle cx="60" cy="60" r="2.6" fill="#FFFFFF" />
  <path d="M60 26 A34 34 0 0 1 94 60 A34 34 0 0 1 60 94 A34 34 0 0 1 30 74"
        stroke="currentColor" stroke-width="0.6" opacity="0.3" stroke-linecap="round" />
  <circle cx="60" cy="26" r="1.4" fill="currentColor" opacity="0.7" />
</svg>
