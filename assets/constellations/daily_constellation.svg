<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Daily constellation astrolabe</title>
  <desc>Minimal monochrome constellation-inspired astrolabe for a daily tracking interface. Transparent background.</desc>
  <g stroke="#111111" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer orbital rings -->
    <circle cx="512" cy="512" r="430" stroke-width="2"/>
    <circle cx="512" cy="512" r="397" stroke-width="1.2" opacity="0.8"/>
    <circle cx="512" cy="512" r="354" stroke-width="1" opacity="0.65"/>
    <circle cx="512" cy="512" r="301" stroke-width="0.9" opacity="0.45"/>
    <circle cx="512" cy="512" r="244" stroke-width="0.8" opacity="0.35"/>
    <circle cx="512" cy="512" r="185" stroke-width="0.8" opacity="0.3"/>

    <!-- axis lines -->
    <path d="M512 57 V967" stroke-width="1.4" opacity="0.85"/>
    <path d="M57 512 H967" stroke-width="1.4" opacity="0.85"/>
    <path d="M190.5 190.5 L833.5 833.5" stroke-width="1" opacity="0.5"/>
    <path d="M833.5 190.5 L190.5 833.5" stroke-width="1" opacity="0.5"/>

    <!-- central star -->
    <g stroke-width="1.6">
      <circle cx="512" cy="512" r="66"/>
      <circle cx="512" cy="512" r="43" opacity="0.6"/>
      <path d="M512 427 L527 497 L597 512 L527 527 L512 597 L497 527 L427 512 L497 497 Z"/>
      <path d="M512 466 V558" opacity="0.9"/>
      <path d="M466 512 H558" opacity="0.9"/>
    </g>

    <!-- constellation polygon coordinates -->
    <!-- points: top, upper-right, lower-right, bottom, lower-left, upper-left -->
    <path d="M512 210 L773.5 361 L773.5 663 L512 814 L250.5 663 L250.5 361 Z" stroke-width="2.2"/>
    <path d="M512 210 L512 512 L773.5 361" stroke-width="1.2" opacity="0.55"/>
    <path d="M512 512 L773.5 663" stroke-width="1.2" opacity="0.55"/>
    <path d="M512 512 L512 814" stroke-width="1.2" opacity="0.55"/>
    <path d="M512 512 L250.5 663" stroke-width="1.2" opacity="0.55"/>
    <path d="M512 512 L250.5 361" stroke-width="1.2" opacity="0.55"/>

    <!-- main node rings -->
    <g stroke-width="1.5">
      <circle cx="512" cy="210" r="48"/>
      <circle cx="512" cy="210" r="34" opacity="0.7"/>
      <circle cx="512" cy="210" r="18" opacity="0.55"/>

      <circle cx="773.5" cy="361" r="48"/>
      <circle cx="773.5" cy="361" r="34" opacity="0.7"/>
      <circle cx="773.5" cy="361" r="18" opacity="0.55"/>

      <circle cx="773.5" cy="663" r="48"/>
      <circle cx="773.5" cy="663" r="34" opacity="0.7"/>
      <circle cx="773.5" cy="663" r="18" opacity="0.55"/>

      <circle cx="512" cy="814" r="48"/>
      <circle cx="512" cy="814" r="34" opacity="0.7"/>
      <circle cx="512" cy="814" r="18" opacity="0.55"/>

      <circle cx="250.5" cy="663" r="48"/>
      <circle cx="250.5" cy="663" r="34" opacity="0.7"/>
      <circle cx="250.5" cy="663" r="18" opacity="0.55"/>

      <circle cx="250.5" cy="361" r="48"/>
      <circle cx="250.5" cy="361" r="34" opacity="0.7"/>
      <circle cx="250.5" cy="361" r="18" opacity="0.55"/>
    </g>

    <!-- symbols inside nodes -->
    <g stroke-width="1.7">
      <!-- top star -->
      <path d="M512 182 L518 204 L540 210 L518 216 L512 238 L506 216 L484 210 L506 204 Z"/>
      <!-- upper right starburst -->
      <path d="M773.5 329 V393 M741.5 361 H805.5 M751 338.5 L796 383.5 M796 338.5 L751 383.5"/>
      <!-- lower right diamond star -->
      <path d="M773.5 635 L784 652.5 L801.5 663 L784 673.5 L773.5 691 L763 673.5 L745.5 663 L763 652.5 Z"/>
      <!-- bottom moon -->
      <path d="M527 790 C505 793 491 811 497 831 C504 852 529 859 548 844 C528 849 510 835 512 814 C514 802 520 794 527 790 Z"/>
      <!-- lower left lotus -->
      <path d="M250.5 690 C233 671 233 649 250.5 633 C268 649 268 671 250.5 690 Z"/>
      <path d="M250.5 688 C224 680 215 659 224 641 C242 649 251 665 250.5 688 Z" opacity="0.8"/>
      <path d="M250.5 688 C277 680 286 659 277 641 C259 649 250 665 250.5 688 Z" opacity="0.8"/>
      <!-- upper left crescent -->
      <path d="M266 337 C245 341 232 359 238 379 C244 397 267 403 285 390 C263 394 246 379 250 358 C253 347 258 340 266 337 Z"/>
    </g>

    <!-- small beads on lines -->
    <g fill="#111111" stroke="none">
      <circle cx="512" cy="355" r="4"/>
      <circle cx="512" cy="669" r="4"/>
      <circle cx="638" cy="438" r="4"/>
      <circle cx="638" cy="586" r="4"/>
      <circle cx="386" cy="438" r="4"/>
      <circle cx="386" cy="586" r="4"/>
      <circle cx="642.8" cy="285.5" r="4"/>
      <circle cx="642.8" cy="738.5" r="4"/>
      <circle cx="381.2" cy="285.5" r="4"/>
      <circle cx="381.2" cy="738.5" r="4"/>
    </g>

    <!-- cardinal ornaments -->
    <g stroke-width="1.4">
      <path d="M512 37 L521 57 L512 77 L503 57 Z"/>
      <path d="M512 947 L521 967 L512 987 L503 967 Z"/>
      <path d="M37 512 L57 503 L77 512 L57 521 Z"/>
      <path d="M947 512 L967 503 L987 512 L967 521 Z"/>
      <circle cx="512" cy="113" r="8"/>
      <circle cx="512" cy="911" r="8"/>
      <circle cx="113" cy="512" r="8"/>
      <circle cx="911" cy="512" r="8"/>
    </g>

    <!-- tiny stars / decorative sparks -->
    <g stroke-width="1">
      <path d="M182 205 V229 M170 217 H194" opacity="0.7"/>
      <path d="M842 205 V229 M830 217 H854" opacity="0.7"/>
      <path d="M182 795 V819 M170 807 H194" opacity="0.7"/>
      <path d="M842 795 V819 M830 807 H854" opacity="0.7"/>
      <circle cx="177" cy="332" r="4" opacity="0.7"/>
      <circle cx="847" cy="332" r="4" opacity="0.7"/>
      <circle cx="177" cy="692" r="4" opacity="0.7"/>
      <circle cx="847" cy="692" r="4" opacity="0.7"/>
    </g>
  </g>
</svg>
