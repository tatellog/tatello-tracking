<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Orbital constellation without labels</title>
  <desc>Minimal orbital constellation SVG without text labels. Use currentColor to control color from React Native.</desc>

  <style>
    .line {
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .orbit-main { stroke-width: 1.8; opacity: 0.72; }
    .orbit-soft { stroke-width: 1.15; opacity: 0.28; stroke-dasharray: 2 8; }
    .axis { stroke-width: 1; opacity: 0.22; }
    .ring { stroke-width: 1.2; opacity: 0.55; }
    .node { fill: currentColor; }
    .node-soft { fill: currentColor; opacity: 0.16; }
    .node-mid { fill: currentColor; opacity: 0.28; }
    .tiny { fill: currentColor; opacity: 0.7; }
    .tiny-soft { fill: currentColor; opacity: 0.38; }
  </style>

  <g id="orbital-constellation" color="#F7A8D7">
    <!-- outer dotted orbital guides -->
    <g id="outer-guides" class="line orbit-soft">
      <circle cx="600" cy="600" r="455"/>
      <circle cx="600" cy="600" r="335"/>
      <ellipse cx="600" cy="600" rx="420" ry="250" transform="rotate(-19 600 600)"/>
    </g>

    <!-- core axes -->
    <g id="axes" class="line axis">
      <path d="M600 120 L600 1080"/>
      <path d="M120 600 L1080 600"/>
      <path d="M260 940 L940 260"/>
      <path d="M260 260 L940 940"/>
    </g>

    <!-- orbital curves -->
    <g id="orbits" class="line orbit-main">
      <ellipse cx="600" cy="600" rx="430" ry="138" transform="rotate(7 600 600)"/>
      <ellipse cx="600" cy="600" rx="432" ry="132" transform="rotate(-32 600 600)"/>
      <ellipse cx="600" cy="600" rx="210" ry="455" transform="rotate(13 600 600)"/>
      <ellipse cx="600" cy="600" rx="128" ry="398" transform="rotate(-23 600 600)"/>
      <ellipse cx="600" cy="600" rx="278" ry="110" transform="rotate(-56 600 600)"/>
      <path d="M190 455 C340 472 465 520 600 600 C735 680 860 728 1010 745"/>
      <path d="M210 755 C355 735 488 670 600 600 C712 530 845 465 990 445"/>
    </g>

    <!-- central astrolabe -->
    <g id="center-rings" class="line ring">
      <circle cx="600" cy="600" r="36"/>
      <circle cx="600" cy="600" r="62"/>
      <circle cx="600" cy="600" r="90"/>
      <circle cx="600" cy="600" r="122" opacity="0.35"/>
      <circle cx="600" cy="600" r="158" opacity="0.22"/>
    </g>

    <!-- main outer node rings -->
    <g id="node-rings" class="line ring">
      <circle cx="600" cy="185" r="48"/>
      <circle cx="180" cy="455" r="48"/>
      <circle cx="1020" cy="455" r="48"/>
      <circle cx="310" cy="885" r="48"/>
      <circle cx="890" cy="885" r="48"/>
      <circle cx="600" cy="1035" r="42"/>

      <circle cx="600" cy="185" r="72" opacity="0.25"/>
      <circle cx="180" cy="455" r="72" opacity="0.25"/>
      <circle cx="1020" cy="455" r="72" opacity="0.25"/>
      <circle cx="310" cy="885" r="72" opacity="0.25"/>
      <circle cx="890" cy="885" r="72" opacity="0.25"/>
      <circle cx="600" cy="1035" r="62" opacity="0.22"/>

      <path d="M600 105 L600 145 M600 225 L600 265"/>
      <path d="M140 455 L100 455 M220 455 L260 455"/>
      <path d="M980 455 L940 455 M1060 455 L1100 455"/>
      <path d="M270 885 L230 885 M350 885 L390 885"/>
      <path d="M850 885 L810 885 M930 885 L970 885"/>
      <path d="M600 963 L600 993 M600 1075 L600 1110"/>
    </g>

    <!-- node glows -->
    <g id="node-glows">
      <circle class="node-soft" cx="600" cy="185" r="64"/>
      <circle class="node-soft" cx="180" cy="455" r="64"/>
      <circle class="node-soft" cx="1020" cy="455" r="64"/>
      <circle class="node-soft" cx="310" cy="885" r="64"/>
      <circle class="node-soft" cx="890" cy="885" r="64"/>
      <circle class="node-soft" cx="600" cy="1035" r="56"/>
      <circle class="node-soft" cx="600" cy="600" r="88"/>
      <circle class="node-mid" cx="600" cy="600" r="42"/>
    </g>

    <!-- star node symbols -->
    <g id="star-nodes" class="node">
      <path d="M600 165 L609 184 L630 193 L609 202 L600 223 L591 202 L570 193 L591 184 Z"/>
      <path d="M180 435 L189 454 L210 463 L189 472 L180 493 L171 472 L150 463 L171 454 Z"/>
      <path d="M1020 435 L1029 454 L1050 463 L1029 472 L1020 493 L1011 472 L990 463 L1011 454 Z"/>
      <path d="M310 865 L319 884 L340 893 L319 902 L310 923 L301 902 L280 893 L301 884 Z"/>
      <path d="M890 865 L899 884 L920 893 L899 902 L890 923 L881 902 L860 893 L881 884 Z"/>
      <path d="M600 1018 L608 1035 L626 1043 L608 1051 L600 1069 L592 1051 L574 1043 L592 1035 Z"/>
      <path d="M600 574 L612 600 L640 612 L612 624 L600 652 L588 624 L560 612 L588 600 Z"/>
    </g>

    <!-- small orbit points -->
    <g id="orbit-points">
      <circle class="tiny" cx="760" cy="250" r="7"/>
      <circle class="tiny" cx="745" cy="350" r="5"/>
      <circle class="tiny" cx="835" cy="415" r="7"/>
      <circle class="tiny" cx="930" cy="322" r="5"/>
      <circle class="tiny" cx="450" cy="448" r="5"/>
      <circle class="tiny" cx="520" cy="510" r="6"/>
      <circle class="tiny" cx="385" cy="735" r="7"/>
      <circle class="tiny" cx="695" cy="735" r="5"/>
      <circle class="tiny" cx="720" cy="820" r="7"/>
      <circle class="tiny" cx="790" cy="885" r="5"/>
      <circle class="tiny-soft" cx="270" cy="298" r="3"/>
      <circle class="tiny-soft" cx="935" cy="252" r="3"/>
      <circle class="tiny-soft" cx="1058" cy="790" r="3"/>
      <circle class="tiny-soft" cx="178" cy="790" r="3"/>
      <circle class="tiny-soft" cx="468" cy="930" r="3"/>
      <circle class="tiny-soft" cx="350" cy="570" r="3"/>
      <circle class="tiny-soft" cx="980" cy="590" r="3"/>
    </g>

    <!-- decorative micro stars -->
    <g id="micro-stars" class="node">
      <path d="M238 245 L243 257 L256 262 L243 267 L238 280 L233 267 L220 262 L233 257 Z" opacity="0.75"/>
      <path d="M960 248 L965 260 L978 265 L965 270 L960 283 L955 270 L942 265 L955 260 Z" opacity="0.65"/>
      <path d="M1080 780 L1086 794 L1100 800 L1086 806 L1080 820 L1074 806 L1060 800 L1074 794 Z" opacity="0.65"/>
      <path d="M205 760 L211 774 L225 780 L211 786 L205 800 L199 786 L185 780 L199 774 Z" opacity="0.65"/>
      <path d="M320 330 L324 339 L334 343 L324 347 L320 357 L316 347 L306 343 L316 339 Z" opacity="0.45"/>
      <path d="M840 300 L844 309 L854 313 L844 317 L840 327 L836 317 L826 313 L836 309 Z" opacity="0.45"/>
      <path d="M515 260 L519 269 L529 273 L519 277 L515 287 L511 277 L501 273 L511 269 Z" opacity="0.45"/>
    </g>
  </g>
</svg>
