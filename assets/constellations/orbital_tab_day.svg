<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
.orbit {
  stroke: #F7A8D7;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  opacity: 0.9;
}
.thin {
  stroke: #F7A8D7;
  stroke-width: 1;
  fill: none;
  opacity: 0.35;
}
.node {
  fill: #FFD6F0;
}
.glow {
  fill: #FF7CCB;
  opacity: 0.15;
}
.label {
  fill: #F8D8EC;
  font-size: 32px;
  font-family: Arial, sans-serif;
  letter-spacing: 6px;
}
.smallstar {
  fill: #F8D8EC;
  opacity: 0.8;
}
</style>

<rect width="1200" height="1200" fill="#090414"/>

<!-- background stars -->
<circle class="smallstar" cx="120" cy="180" r="2"/>
<circle class="smallstar" cx="300" cy="240" r="1.5"/>
<circle class="smallstar" cx="880" cy="150" r="2"/>
<circle class="smallstar" cx="1020" cy="260" r="1.5"/>
<circle class="smallstar" cx="180" cy="940" r="2"/>
<circle class="smallstar" cx="980" cy="920" r="2"/>
<circle class="smallstar" cx="760" cy="1040" r="1.5"/>
<circle class="smallstar" cx="540" cy="120" r="1.5"/>

<!-- outer guide circles -->
<circle class="thin" cx="600" cy="600" r="420"/>
<circle class="thin" cx="600" cy="600" r="280"/>

<!-- orbit system -->
<ellipse class="orbit" cx="600" cy="600" rx="360" ry="150" transform="rotate(20 600 600)"/>
<ellipse class="orbit" cx="600" cy="600" rx="180" ry="420" transform="rotate(10 600 600)"/>
<ellipse class="orbit" cx="600" cy="600" rx="420" ry="210" transform="rotate(-28 600 600)"/>
<ellipse class="orbit" cx="600" cy="600" rx="240" ry="120" transform="rotate(-55 600 600)"/>

<!-- center -->
<circle class="glow" cx="600" cy="600" r="120"/>
<circle class="glow" cx="600" cy="600" r="70"/>
<circle class="node" cx="600" cy="600" r="18"/>

<!-- central rings -->
<circle class="thin" cx="600" cy="600" r="50"/>
<circle class="thin" cx="600" cy="600" r="90"/>
<circle class="thin" cx="600" cy="600" r="140"/>

<!-- axis -->
<line class="thin" x1="600" y1="180" x2="600" y2="1020"/>
<line class="thin" x1="180" y1="600" x2="1020" y2="600"/>

<!-- nodes -->
<circle class="glow" cx="600" cy="220" r="42"/>
<circle class="node" cx="600" cy="220" r="14"/>

<circle class="glow" cx="210" cy="500" r="42"/>
<circle class="node" cx="210" cy="500" r="14"/>

<circle class="glow" cx="990" cy="500" r="42"/>
<circle class="node" cx="990" cy="500" r="14"/>

<circle class="glow" cx="320" cy="880" r="42"/>
<circle class="node" cx="320" cy="880" r="14"/>

<circle class="glow" cx="880" cy="880" r="42"/>
<circle class="node" cx="880" cy="880" r="14"/>

<circle class="glow" cx="600" cy="1020" r="36"/>
<circle class="node" cx="600" cy="1020" r="12"/>


</svg>