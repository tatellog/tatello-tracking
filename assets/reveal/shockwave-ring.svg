<!--
  Reveal shockwave ring — a single thin energy ring that, in code,
  expands from r≈10 to r≈170 and fades 0.7 → 0 over ~600 ms at the
  climax instant. This file is the static geometry / fallback; frontend
  animates r + opacity (numeric, UI-thread safe) on the climax clock.

  Distinct from the Tab's CompletionRings (those are slow, looping,
  faint, PERMANENT once at day 28). This is ONE outward pulse, fast and
  ceremonial. Two concentric strokes (a cream leading edge + a magenta
  trailing wash) give the wave thickness without a fill.

  currentColor on the leading edge so it can be tinted cream; the
  trailing wash is brand magenta. viewBox centred on 180,180.
-->
<svg viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- trailing magenta wash (drawn first, slightly larger) -->
  <circle cx="180" cy="180" r="120" fill="none" stroke="#E91E63" stroke-width="2.4" opacity="0.22"/>
  <!-- crisp cream leading edge -->
  <circle cx="180" cy="180" r="118" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>
</svg>
