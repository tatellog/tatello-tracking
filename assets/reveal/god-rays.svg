<!--
  Reveal god-rays — 11 asymmetric volumetric shafts radiating from the
  reveal centre. CEREMONIAL, single-use: this is the climax burst the
  Tab de Hoy never shows (the Tab's VolumetricRays are 8 even cardinal
  rays at opacity 0.04–0.07, ambient & permanent; THESE are irregular,
  uneven, bright, and exist only for the ~700 ms flash).

  Asymmetry on purpose (anti-reticle): 11 rays (odd count), irregular
  angular spacing, alternating long/short, NONE on the pure cardinal
  axes — so it reads as a sunburst of light, never a targeting cross.

  currentColor on every stroke → frontend tints cream (#FFF6E5) for the
  flash, optionally a second magenta pass underneath. viewBox centred on
  180,180 to match STAGE_SIZE 360. Frontend animates each ray's length
  (numeric x2/y2) + opacity on the climax clock; this file is the
  geometry reference / static fallback.
-->
<svg viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g stroke="currentColor" stroke-linecap="round">
    <line x1="180" y1="180" x2="180"  y2="22"  stroke-width="1.4" opacity="0.55"/>
    <line x1="180" y1="180" x2="262"  y2="64"  stroke-width="0.7" opacity="0.30"/>
    <line x1="180" y1="180" x2="318"  y2="138" stroke-width="1.1" opacity="0.45"/>
    <line x1="180" y1="180" x2="330"  y2="206" stroke-width="0.6" opacity="0.26"/>
    <line x1="180" y1="180" x2="292"  y2="286" stroke-width="1.2" opacity="0.42"/>
    <line x1="180" y1="180" x2="214"  y2="324" stroke-width="0.7" opacity="0.30"/>
    <line x1="180" y1="180" x2="150"  y2="336" stroke-width="1.0" opacity="0.40"/>
    <line x1="180" y1="180" x2="74"   y2="300" stroke-width="0.6" opacity="0.24"/>
    <line x1="180" y1="180" x2="40"   y2="216" stroke-width="1.3" opacity="0.48"/>
    <line x1="180" y1="180" x2="56"   y2="120" stroke-width="0.7" opacity="0.30"/>
    <line x1="180" y1="180" x2="118"  y2="50"  stroke-width="0.9" opacity="0.36"/>
  </g>
</svg>
