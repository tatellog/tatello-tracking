# Deploy the scan-meal edge function whenever its code lands on main, so
# main and the live function never drift (e.g. the app calling for sugar /
# beverages while an older function is still deployed).
#
# Scoped to scan-meal on purpose: delete-account has its own deploy config
# and isn't auto-deployed here. Add another path + deploy step if/when you
# want it covered too.
#
# Requires a repo secret SUPABASE_ACCESS_TOKEN (Supabase dashboard →
# Account → Access Tokens). The project ref is public (it's in the API URL).
name: Deploy edge functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/scan-meal/**'

jobs:
  deploy-scan-meal:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: mmgexmzjycouzfngmkqm
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy scan-meal
        run: supabase functions deploy scan-meal --project-ref "$PROJECT_REF"
